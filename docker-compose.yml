services:
  app1:
    build:
      context: .
      dockerfile: dockerfile.app1
    container_name: app1-server
    restart: unless-stopped
    environment:
      - GIN_MODE=${GIN_MODE}
      - APP_ENV=${APP_ENV}
      - KAFKA_BROKER=${KAFKA_BROKER}
      - DB_HOST=postgres-app1
      - DB_PORT=5432
      - DB_USER=${DB_USER}
      - DB_PASSWORD=${DB_PASSWORD}
      - DB_NAME=${DB_NAME}
      - DB_SCHEMA=${DB_SCHEMA}
      - JWT_SIGNING_KEY=${JWT_SIGNING_KEY}
      - JWT_ISSUER=${JWT_ISSUER}
      - POOL_TEST_HOLD_SECONDS=${POOL_TEST_HOLD_SECONDS}
      - GMAIL_USER=${GMAIL_USER}
      - GMAIL_APP_PASS=${GMAIL_APP_PASS}
    ports:
      - "9090:8080"
    depends_on:
      postgres:
        condition: service_healthy
      kafka:
        condition: service_healthy
    networks:
      - shared-network

  app1-replica:
    build:
      context: .
      dockerfile: dockerfile.app1
    container_name: app1-server-2
    restart: unless-stopped
    environment:
      - GIN_MODE=${GIN_MODE}
      - APP_ENV=${APP_ENV}
      - KAFKA_BROKER=${KAFKA_BROKER}
      - DB_HOST=postgres-app1
      - DB_PORT=5432
      - DB_USER=${DB_USER}
      - DB_PASSWORD=${DB_PASSWORD}
      - DB_NAME=${DB_NAME}
      - DB_SCHEMA=${DB_SCHEMA}
      - JWT_SIGNING_KEY=${JWT_SIGNING_KEY}
      - JWT_ISSUER=${JWT_ISSUER}
      - POOL_TEST_HOLD_SECONDS=${POOL_TEST_HOLD_SECONDS}
      - GMAIL_USER=${GMAIL_USER}
      - GMAIL_APP_PASS=${GMAIL_APP_PASS}
    ports:
      - "8081:8080"
    depends_on:
      postgres:
        condition: service_healthy
      kafka:
        condition: service_healthy
    networks:
      - shared-network

  # ── Kong ────────────────────────────────────────────────────────────────────

  kong-database:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: kong
      POSTGRES_PASSWORD: kong
      POSTGRES_DB: kong
    volumes:
      - kong_db_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U kong -d kong"]
      interval: 5s
      timeout: 3s
      retries: 5
    networks:
      - shared-network

  kong-migrations:
    image: kong:latest
    command: kong migrations bootstrap
    environment:
      - KONG_DATABASE=postgres
      - KONG_PG_HOST=kong-database
      - KONG_PG_USER=kong
      - KONG_PG_PASSWORD=kong
      - KONG_PG_DATABASE=kong
    depends_on:
      kong-database:
        condition: service_healthy
    networks:
      - shared-network
    restart: on-failure

  kong:
    build:
      context: .
      dockerfile: dockerfile.kong
    image: kong_main-kong:${KONG_VERSION:-latest}
    restart: unless-stopped
    ports:
      - "8000:8000"
      - "8001:8001"
      - "8002:8002"
    environment:
      - KONG_PLUGINS=bundled,permission_check
      - KONG_DATABASE=postgres
      - KONG_PG_HOST=kong-database
      - KONG_PG_USER=kong
      - KONG_PG_PASSWORD=kong
      - KONG_PG_DATABASE=kong
      - KONG_PROXY_ACCESS_LOG=/dev/stdout
      - KONG_ADMIN_ACCESS_LOG=/dev/stdout
      - KONG_PROXY_ERROR_LOG=/dev/stderr
      - KONG_ADMIN_ERROR_LOG=/dev/stderr
      - KONG_ADMIN_LISTEN=0.0.0.0:8001
      - KONG_ADMIN_GUI_URL=http://localhost:8002
      - KONG_ADMIN_GUI_API_URL=http://localhost:8001
    depends_on:
      kong-database:
        condition: service_healthy
      kong-migrations:
        condition: service_completed_successfully
    healthcheck:
      test: ["CMD", "kong", "health"]
      interval: 10s
      timeout: 5s
      retries: 5
    volumes:
      - ./plugins/permission_check:/usr/local/share/lua/5.1/kong/plugins/permission_check
    networks:
      - shared-network

  # ── Kong config sync (decK) ──────────────────────────────────────────────────

  kong-config:
    image: kong/deck:latest
    depends_on:
      kong:
        condition: service_healthy
    volumes:
      - ./kong.yml:/kong.yml:ro
    command: ["sync", "--kong-addr", "http://kong:8001", "-s", "/kong.yml"]
    networks:
      - shared-network
    restart: "no"

  # ── App DB ──────────────────────────────────────────────────────────────────

  postgres:
    image: postgres:16-alpine
    hostname: postgres-app1
    container_name: intern-project-postgres-2
    restart: unless-stopped
    ports:
      - "${DB_PORT}:5432"
    environment:
      POSTGRES_USER: ${DB_USER}
      POSTGRES_PASSWORD: ${DB_PASSWORD}
      POSTGRES_DB: ${DB_NAME}
      DB_SCHEMA: ${DB_SCHEMA}
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./docker/init:/docker-entrypoint-initdb.d:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USER} -d ${DB_NAME}"]
      interval: 5s
      timeout: 3s
      retries: 5
    networks:
      - shared-network

  # ── Kafka ───────────────────────────────────────────────────────────────────

  zookeeper:
    image: confluentinc/cp-zookeeper:7.4.0
    restart: unless-stopped
    volumes:
      - zookeeper_data:/var/lib/zookeeper/data
    environment:
      ZOOKEEPER_CLIENT_PORT: 2181
      ZOOKEEPER_TICK_TIME: 2000
    networks:
      - shared-network

  kafka:
    image: confluentinc/cp-kafka:7.4.0
    restart: unless-stopped
    depends_on:
      - zookeeper
    ports:
      - "9092:9092"
    volumes:
      - kafka_data:/var/lib/kafka/data
    environment:
      KAFKA_BROKER_ID: 1
      KAFKA_ZOOKEEPER_CONNECT: zookeeper:2181
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: PLAINTEXT:PLAINTEXT,PLAINTEXT_HOST:PLAINTEXT
      KAFKA_LISTENERS: PLAINTEXT://0.0.0.0:29092,PLAINTEXT_HOST://0.0.0.0:9092
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://kafka:29092,PLAINTEXT_HOST://localhost:9092
      KAFKA_INTER_BROKER_LISTENER_NAME: PLAINTEXT
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
    healthcheck:
      test:
        ["CMD-SHELL", "kafka-topics --bootstrap-server localhost:9092 --list"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 30s
    networks:
      - shared-network

networks:
  shared-network:
    external: true

volumes:
  postgres_data:
  kong_db_data:
  zookeeper_data:
  kafka_data:
